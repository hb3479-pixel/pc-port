    <script>
        function resizeCanvas() {
            const canvas = document.getElementById("canvas");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("load", function() {
            resizeCanvas();
            GameMaker_Init();
        });
    </script>

    <!-- 🔧 Sprite path fix -->
    <script>
    (function() {
      const CDN = "https://cdn.jsdelivr.net/gh/genizy/web-port@23bcb22895b42008359e76f1e08f1b7fad4a71e9/hotline-miami/";

      // Fix <img>.src
      const OriginalImage = window.Image;
      window.Image = function() {
        const img = new OriginalImage();
        const srcSetter = Object.getOwnPropertyDescriptor(OriginalImage.prototype, "src").set;
        Object.defineProperty(img, "src", {
          set(value) {
            if (typeof value === "string" && (value.endsWith(".png") || value.endsWith(".jpg")) && !value.startsWith("http") && !value.startsWith("data:")) {
              value = CDN + value.replace(/^\.\//, "");
            }
            srcSetter.call(this, value);
          },
          configurable: true
        });
        return img;
      };
      window.Image.prototype = OriginalImage.prototype;

      // Fix fetch()
      const originalFetch = window.fetch;
      window.fetch = function(url, options) {
        if (typeof url === "string" && (url.endsWith(".png") || url.endsWith(".jpg")) && !url.startsWith("http") && !url.startsWith("data:")) {
          url = CDN + url.replace(/^\.\//, "");
        }
        return originalFetch(url, options);
      };

      // Fix XMLHttpRequest
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        if (typeof url === "string" && (url.endsWith(".png") || url.endsWith(".jpg")) && !url.startsWith("http") && !url.startsWith("data:")) {
          url = CDN + url.replace(/^\.\//, "");
        }
        return originalOpen.call(this, method, url);
      };
    })();
    </script>
