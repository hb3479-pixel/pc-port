<!DOCTYPE html>
<html lang="en">
<head>
    <!-- removed <base> line so it uses local files -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="pragma" content="no-cache"/>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta charset="utf-8"/>

    <title>hotline miami</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            border: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            image-rendering: optimizeSpeed;
            -webkit-interpolation-mode: nearest-neighbor;
            -ms-touch-action: none;
        }

        div.gm4html5_div_class {
            margin: 0;
            padding: 0;
            border: 0;
            height: 100%;
        }

        div.gm4html5_login {
            padding: 20px;
            position: absolute;
            border: solid 2px #000000;
            background-color: #404040;
            color:#00ff00;
            border-radius: 15px;
            box-shadow: #101010 20px 20px 40px;
        }

        div.gm4html5_cancel_button {
            float: right;
        }

        div.gm4html5_login_button {
            float: left;
        }

        div.gm4html5_login_header {
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="gm4html5_div_class" id="gm4html5_div_id">
        <canvas id="canvas"></canvas>
    </div>

    <!-- keep original loader -->
    <script type="text/javascript" src="html5game/HotlineMiami.js"></script>
    <script>
        function resizeCanvas() {
            const canvas = document.getElementById("canvas");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener("resize", resizeCanvas);
        window.addEventListener("load", function() {
            resizeCanvas();
            GameMaker_Init();
        });
    </script>

    <!-- 🔧 Keyboard patch -->
    <script>
    (function() {
      let keys = {};

      window.addEventListener("keydown", e => { keys[e.key] = true; });
      window.addEventListener("keyup", e => { keys[e.key] = false; });

      // Override GameMaker keyboard_check
      window.keyboard_check = function(vk) {
        switch(vk) {
          case 37: return keys["ArrowLeft"]  || keys["a"] || keys["A"];
          case 38: return keys["ArrowUp"]    || keys["w"] || keys["W"];
          case 39: return keys["ArrowRight"] || keys["d"] || keys["D"];
          case 40: return keys["ArrowDown"]  || keys["s"] || keys["S"];
          default: return false;
        }
      };

      // Safety: clear stuck keys if window loses focus
      setInterval(() => {
        if (!document.hasFocus()) {
          keys = {};
        }
      }, 100);
    })();
    </script>
</body>
</html>
