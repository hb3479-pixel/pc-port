name: Deploy Bendy Only
on:
  push:
    branches: [main]
  workflow_dispatch: # This adds a "Run" button for you
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: 'bendy-and-the-time-machine'
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'bendy-and-the-time-machine'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
