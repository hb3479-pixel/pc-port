name: Deploy Bendy Only
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            *
          sparse-checkout-cone-mode: false
      
      - name: Verify Folders
        run: ls -R # This tells us exactly what folders exist if it fails again

      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Change the line below if the folder name is different!
          path: 'bendy-and-the-time-machine' 

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
