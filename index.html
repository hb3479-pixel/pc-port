<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotline Miami Loader</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="gameFrame" src="hotline-miami/index.html"></iframe>

  <script>
    // Try to request fullscreen once the page loads
    window.addEventListener("load", () => {
      const el = document.documentElement;

      function goFullscreen() {
        if (!document.fullscreenElement) {
          if (el.requestFullscreen) el.requestFullscreen();
          else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
          else if (el.msRequestFullscreen) el.msRequestFullscreen();
        }
      }

      // Try immediately and again after a click (some browsers require interaction)
      goFullscreen();
      document.addEventListener("click", goFullscreen);
      document.addEventListener("keydown", goFullscreen);
    });
  </script>
</body>
</html>
